<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toronto → NYC Bike Trip</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root {
    --bg: #faf8f5;
    --panel: #fff;
    --ink: #1a1a1a;
    --muted: #666;
    --line: #e5e0d8;
    --accent: #e64414;
    --accent-soft: #fff1ec;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--ink); }
  #app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
  #sidebar { background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; }
  #map { height: 100vh; }
  .header { padding: 24px 24px 16px; border-bottom: 1px solid var(--line); }
  .title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px; }
  .subtitle { font-size: 13px; color: var(--muted); margin: 0; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); z-index: 10; }
  .tab { flex: 1; padding: 12px 8px; background: none; border: none; border-bottom: 2px solid transparent; font: inherit; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); cursor: pointer; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel { padding: 16px 20px 32px; display: none; }
  .panel.active { display: block; }
  .card { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; }
  .card:hover { border-color: var(--accent); background: var(--accent-soft); }
  .card-title { font-size: 14px; font-weight: 600; margin: 0 0 4px; line-height: 1.3; }
  .card-meta { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.45; margin: 0; }
  .group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 16px 0 8px; padding-left: 2px; }
  .group-label:first-child { margin-top: 4px; }
  .summary { display: flex; gap: 16px; padding: 16px 24px; background: var(--accent-soft); border-bottom: 1px solid var(--line); }
  .stat { flex: 1; }
  .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 4px; }
  .leaflet-popup-content { font-family: inherit; font-size: 13px; }
  .leaflet-popup-content strong { display: block; margin-bottom: 4px; }
  @media (max-width: 768px) {
    #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    #sidebar { max-height: 50vh; border-right: none; border-bottom: 1px solid var(--line); }
    #map { height: 50vh; }
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="header">
      <h1 class="title">Toronto → NYC</h1>
      <p class="subtitle">Via Route 5 + Empire State Trail</p>
    </div>
    <div class="summary">
      <div class="stat"><div class="stat-value">~1,065</div><div class="stat-label">km total</div></div>
      <div class="stat"><div class="stat-value">7</div><div class="stat-label">riding days</div></div>
      <div class="stat"><div class="stat-value">+1</div><div class="stat-label">rest day</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="days">Days</button>
      <button class="tab" data-tab="hotels">Hotels</button>
      <button class="tab" data-tab="waypoints">Waypoints</button>
    </div>
    <div id="panel-days" class="panel active"></div>
    <div id="panel-hotels" class="panel"></div>
    <div id="panel-waypoints" class="panel"></div>
  </aside>
  <div id="map"></div>
</div>

<script>
const DATA = {
  route: [
    [-79.3832,43.6532],[-79.5441,43.589],[-79.6393,43.5048],[-79.7633,43.3832],
    [-79.8,43.1823],[-79.2469,43.1594],[-79.0849,43.0896],[-78.9323,42.9014],
    [-78.8784,42.8864],[-78.1876,43.002],[-77.6088,43.1566],[-77.0445,43.0797],
    [-76.1474,43.0481],[-75.6497,43.0735],[-75.2327,43.1009],[-74.9802,43.0501],
    [-74.5688,42.942],[-73.9396,42.8142],[-73.7562,42.6526],[-73.791,42.2529],
    [-73.901,41.9409],[-73.9209,41.7004],[-73.984,41.5048],[-73.8934,41.29],
    [-73.8685,41.0534],[-73.8987,40.9312],[-74.006,40.7128]
  ],
  days: [
    { name: "START — Toronto", lng: -79.3832, lat: 43.6532, meta: "Departure", desc: "Head west on Waterfront Trail." },
    { name: "BORDER — Peace Bridge", lng: -78.9323, lat: 42.9014, meta: "Fort Erie → Buffalo", desc: "Use south sidewalk. Passport required. Cross early morning to avoid traffic." },
    { name: "DAY 1 — Buffalo", lng: -78.8784, lat: 42.8864, meta: "~160 km", desc: "Via Waterfront Trail, Hamilton, St. Catharines, Peace Bridge. Stay in Theatre District / Allentown — safe, well-lit. AVOID East Side east of Main St." },
    { name: "DAY 2 — Rochester", lng: -77.6088, lat: 43.1566, meta: "~175 km", desc: "Route 5 west through Batavia. Stay near East Main St / Convention Center area. AVOID north of Main St residential areas." },
    { name: "DAY 3 — Syracuse", lng: -76.1474, lat: 43.0481, meta: "~165 km", desc: "Route 5 through Finger Lakes north. Stay in Armory Square — best district in town. AVOID west side past Geddes St, south side." },
    { name: "DAY 4+5 — Utica / REST", lng: -75.2327, lat: 43.1009, meta: "~100 km + rest day", desc: "Shorter ride, then rest day. Stay on Genesee Street (north section). AVOID south of Oriskany St, west side residential." },
    { name: "DAY 6 — Albany", lng: -73.7562, lat: 42.6526, meta: "~175 km", desc: "Mohawk Valley, some rolling hills. Stay in government district near Capitol. AVOID Arbor Hill (north of Clinton Ave), South End." },
    { name: "DAY 7 — Poughkeepsie", lng: -73.9209, lat: 41.7004, meta: "~160 km", desc: "Empire State Trail south, Hudson Valley. Stay near Civic Center / waterfront or go suburban on Route 9. AVOID Main St / Market St corridor, south side neighborhoods." },
    { name: "FINISH — New York City", lng: -74.006, lat: 40.7128, meta: "~130 km", desc: "Hudson River Greenway into Manhattan. Battery Park. You made it." }
  ],
  hotels: [
    { name: "Best Western On The Avenue", city: "Buffalo", day: "DAY 1", lng: -78.8768, lat: 42.8986, desc: "510 Delaware Ave. ~$75-100/night. Allentown — one of Buffalo's safest neighborhoods. 1km from Route 5 but right on your approach from Peace Bridge." },
    { name: "Aloft Buffalo Downtown", city: "Buffalo", day: "DAY 1", lng: -78.871, lat: 42.8876, desc: "500 Pearl St. ~$120-180/night. Theatre District, 3 blocks from Route 5. Safe, busy evening foot traffic." },
    { name: "Hilton Garden Inn Rochester Downtown", city: "Rochester", day: "DAY 2", lng: -77.6078, lat: 43.1568, desc: "155 E Main St. ~$130-200/night. DIRECTLY ON Route 5. Convention center area, well-patrolled." },
    { name: "Hyatt Regency Rochester", city: "Rochester", day: "DAY 2", lng: -77.6115, lat: 43.1568, desc: "125 E Main St. ~$120-180/night. DIRECTLY ON Route 5. Convention center corridor." },
    { name: "Courtyard Marriott Armory Square", city: "Syracuse", day: "DAY 3", lng: -76.158, lat: 43.0481, desc: "300 W Fayette St. ~$140-200/night. Armory Square, 2 blocks from Route 5. Safest district in Syracuse." },
    { name: "Jefferson Clinton Hotel", city: "Syracuse", day: "DAY 3", lng: -76.1505, lat: 43.0445, desc: "416 S Clinton St. ~$120-170/night. Heart of Armory Square. Boutique, surrounded by restaurants." },
    { name: "Delta Hotels Marriott Utica (RECOMMENDED)", city: "Utica", day: "DAY 4+5", lng: -75.2316, lat: 43.0981, desc: "200 Genesee St. ~$110-160/night. DIRECTLY ON Route 5. Near Stanley Theatre. Good amenities for rest day." },
    { name: "Fairfield Inn Utica Downtown", city: "Utica", day: "DAY 4+5", lng: -75.2325, lat: 43.099, desc: "71 N Genesee St. ~$100-140/night. ON Route 5. North Genesee is the safer commercial section." },
    { name: "Red Roof Inn Utica", city: "Utica", day: "DAY 4+5", lng: -75.2163, lat: 43.1134, desc: "20 Weaver St. ~$60-80/night. No frills but cheap." },
    { name: "Hilton Albany", city: "Albany", day: "DAY 6", lng: -73.756, lat: 42.6497, desc: "40 Lodge St. ~$140-200/night. Government district, 3 blocks from Empire State Trail at Corning Preserve." },
    { name: "Hampton Inn Albany Downtown", city: "Albany", day: "DAY 6", lng: -73.7545, lat: 42.653, desc: "25 Chapel St. ~$130-180/night. Near Palace Theatre, 5 blocks from trail." },
    { name: "DoubleTree Poughkeepsie (Civic Center)", city: "Poughkeepsie", day: "DAY 7", lng: -73.9263, lat: 41.7004, desc: "40 Civic Center Plaza. ~$120-180/night. 0.5km from Walkway Over the Hudson. Stay on the plaza side, don't wander east on Main St at night." },
    { name: "Red Roof PLUS+ Poughkeepsie", city: "Poughkeepsie", day: "DAY 7", lng: -73.9257, lat: 41.6479, desc: "2349 South Rd. ~$70-90/night. Route 9 suburban strip, safe, 3km detour off trail." },
    { name: "Hampton Inn Poughkeepsie", city: "Poughkeepsie", day: "DAY 7", lng: -73.9259, lat: 41.6481, desc: "2361 South Rd. ~$130-170/night. Next to Red Roof, same safe suburban strip." }
  ],
  waypoints: [
    { name: "Hamilton", lng: -79.7633, lat: 43.3832, desc: "Day 1 — Waterfront Trail through Burlington" },
    { name: "St. Catharines", lng: -79.2469, lat: 43.1594, desc: "Day 1 — Through Niagara wine country" },
    { name: "Batavia", lng: -78.1876, lat: 43.002, desc: "Day 2 — Midway Buffalo to Rochester" },
    { name: "Geneva", lng: -77.0445, lat: 43.0797, desc: "Day 3 — Finger Lakes, good lunch stop" },
    { name: "Amsterdam", lng: -74.5688, lat: 42.942, desc: "Day 6 — Mohawk Valley, rolling hills begin" },
    { name: "Schenectady", lng: -73.9396, lat: 42.8142, desc: "Day 6 — Last major town before Albany" },
    { name: "Hudson", lng: -73.791, lat: 42.2529, desc: "Day 7 — Empire State Trail, 36mi paved from Albany" },
    { name: "Rhinebeck", lng: -73.901, lat: 41.9409, desc: "Day 7 — Scenic Hudson Valley town" },
    { name: "Walkway Over the Hudson", lng: -73.943, lat: 41.714, desc: "Day 7 — Iconic converted rail bridge. A highlight of the trip." },
    { name: "Beacon", lng: -73.984, lat: 41.5048, desc: "Day 8 — Good coffee stop, Hudson Valley" },
    { name: "Peekskill", lng: -73.8934, lat: 41.29, desc: "Day 8 — Traffic picks up from here south" },
    { name: "Tarrytown", lng: -73.8685, lat: 41.0534, desc: "Day 8 — Westchester, last stretch before NYC" }
  ]
};

const map = L.map('map', { zoomControl: true }).setView([42.3, -76.5], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const routeLine = L.polyline(DATA.route.map(([lng, lat]) => [lat, lng]), {
  color: '#e64414', weight: 4, opacity: 0.9
}).addTo(map);
map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });

function makeIcon(color, size = 12) {
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

const dayIcon = makeIcon('#e64414', 14);
const hotelIcon = makeIcon('#2563eb', 10);
const waypointIcon = makeIcon('#6b7280', 8);

const markers = {};

DATA.days.forEach((d, i) => {
  const m = L.marker([d.lat, d.lng], { icon: dayIcon })
    .bindPopup(`<strong>${d.name}</strong>${d.meta}<br><br>${d.desc}`)
    .addTo(map);
  markers[`day-${i}`] = m;
});
DATA.hotels.forEach((h, i) => {
  const m = L.marker([h.lat, h.lng], { icon: hotelIcon })
    .bindPopup(`<strong>🏨 ${h.name}</strong>${h.day} · ${h.city}<br><br>${h.desc}`)
    .addTo(map);
  markers[`hotel-${i}`] = m;
});
DATA.waypoints.forEach((w, i) => {
  const m = L.marker([w.lat, w.lng], { icon: waypointIcon })
    .bindPopup(`<strong>${w.name}</strong>${w.desc}`)
    .addTo(map);
  markers[`waypoint-${i}`] = m;
});

function flyTo(key, lat, lng) {
  map.flyTo([lat, lng], 11, { duration: 0.8 });
  setTimeout(() => markers[key]?.openPopup(), 800);
}

const daysPanel = document.getElementById('panel-days');
DATA.days.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<div class="card-meta">${d.meta}</div><div class="card-title">${d.name}</div><p class="card-desc">${d.desc}</p>`;
  card.onclick = () => flyTo(`day-${i}`, d.lat, d.lng);
  daysPanel.appendChild(card);
});

const hotelsPanel = document.getElementById('panel-hotels');
const hotelsByCity = {};
DATA.hotels.forEach((h, i) => {
  (hotelsByCity[h.city] = hotelsByCity[h.city] || []).push({ ...h, _i: i });
});
Object.entries(hotelsByCity).forEach(([city, list]) => {
  const label = document.createElement('div');
  label.className = 'group-label';
  label.textContent = `${list[0].day} · ${city}`;
  hotelsPanel.appendChild(label);
  list.forEach(h => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-title">🏨 ${h.name}</div><p class="card-desc">${h.desc}</p>`;
    card.onclick = () => flyTo(`hotel-${h._i}`, h.lat, h.lng);
    hotelsPanel.appendChild(card);
  });
});

const waypointsPanel = document.getElementById('panel-waypoints');
DATA.waypoints.forEach((w, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<div class="card-title">${w.name}</div><p class="card-desc">${w.desc}</p>`;
  card.onclick = () => flyTo(`waypoint-${i}`, w.lat, w.lng);
  waypointsPanel.appendChild(card);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
  };
});
</script>
</body>
</html>
